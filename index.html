  <br/>
  <button style="text-align:center;background-color:rgb(30, 124, 218);

<br/>
<B>Transaction</B>
<br/>
Bakso
<br/>

<br/>

<br/>

<br/>
<input type="text"><button>Delete</button>
</body>
</html>
<p style="text-align:right"></p>
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>Spending by category</h2>
  <canvas id="myPieChart" width="400" height="400"></canvas>

  <script>
    const ctx = document.getElementById('myPieChart').getContext('2d');
    const myPieChart = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: ['Bakso', 'Train', 'Ancol'],
        datasets: [{
          data: [42.5, 55.2, 17.2], // proporsi
          backgroundColor: ['red', 'blue', 'green'], // warna tiap bagian
          borderColor: '#fff',
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom'
          },
          title: {
            display: true,
            text: 'Pie Chart: Bakso, Train, Ancol'
          }
        }
      }
    });
  </script>
